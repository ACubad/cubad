name: Nightly database backup

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          echo "DUMP_STAMP=$STAMP" >> "$GITHUB_ENV"
          mkdir backup

          # Supabase's wrapper applies the provider-specific filters required for a
          # logical dump to restore into a fresh hosted project. Pin the CLI so the
          # artifact format cannot drift silently between scheduled runs.
          SUPABASE_CLI=(npx --yes supabase@2.109.1)
          "${SUPABASE_CLI[@]}" db dump --db-url "$SUPABASE_DB_URL" \
            --file backup/roles.sql --role-only
          "${SUPABASE_CLI[@]}" db dump --db-url "$SUPABASE_DB_URL" \
            --file backup/schema.sql
          "${SUPABASE_CLI[@]}" db dump --db-url "$SUPABASE_DB_URL" \
            --file backup/data.sql --use-copy --data-only \
            --exclude storage.buckets_vectors \
            --exclude storage.vector_indexes

          # Preserve CLI migration history separately because the normal filtered
          # dump intentionally excludes this provider-managed schema.
          "${SUPABASE_CLI[@]}" db dump --db-url "$SUPABASE_DB_URL" \
            --file backup/history_schema.sql --schema supabase_migrations
          "${SUPABASE_CLI[@]}" db dump --db-url "$SUPABASE_DB_URL" \
            --file backup/history_data.sql --use-copy --data-only \
            --schema supabase_migrations

          test -s backup/roles.sql
          test -s backup/schema.sql
          test -s backup/data.sql
          test -s backup/history_schema.sql
          test -s backup/history_data.sql
          tar -czf "cubad-backup-$STAMP.tar.gz" -C backup \
            roles.sql schema.sql data.sql history_schema.sql history_data.sql

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubad-backup-${{ env.DUMP_STAMP }}
          path: cubad-backup-${{ env.DUMP_STAMP }}.tar.gz
          retention-days: 14

      # Optional off-GitHub copy. Enable only after adding RCLONE_CONFIG_BASE64,
      # containing an rclone.conf with a Drive remote named "gdrive".
      # - name: Install rclone
      #   run: curl https://rclone.org/install.sh | sudo bash
      # - name: Configure rclone
      #   run: |
      #     mkdir -p ~/.config/rclone
      #     echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf
      # - name: Copy to Google Drive
      #   run: rclone copy "cubad-backup-${{ env.DUMP_STAMP }}.tar.gz" gdrive:cubad-backups/
