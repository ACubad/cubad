name: Nightly database backup

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          source /etc/os-release
          {
            echo "Types: deb"
            echo "URIs: https://apt.postgresql.org/pub/repos/apt"
            echo "Suites: ${VERSION_CODENAME}-pgdg"
            echo "Architectures: $(dpkg --print-architecture)"
            echo "Components: main"
            echo "Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc"
          } | sudo tee /etc/apt/sources.list.d/pgdg.sources >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          echo "DUMP_STAMP=$STAMP" >> "$GITHUB_ENV"
          # Raw pg_dump keeps the CI path small and needs no Supabase CLI login.
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges --format=plain \
            --file="cubad-backup-$STAMP.sql"
          gzip "cubad-backup-$STAMP.sql"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubad-backup-${{ env.DUMP_STAMP }}
          path: cubad-backup-${{ env.DUMP_STAMP }}.sql.gz
          retention-days: 14

      # Optional off-GitHub copy. Enable only after adding RCLONE_CONFIG_BASE64,
      # containing an rclone.conf with a Drive remote named "gdrive".
      # - name: Install rclone
      #   run: curl https://rclone.org/install.sh | sudo bash
